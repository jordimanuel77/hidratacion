<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Hidratación">
  <meta name="theme-color" content="#F5F0E8">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>Hidratación</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }

    html, body {
      height: 100%; width: 100%;
      background: #F5F0E8;
      font-family: 'DM Sans', -apple-system, sans-serif;
      overflow: hidden;
    }

    .app {
      width: 100%; height: 100%;
      background: #F5F0E8;
      display: flex; flex-direction: column;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }

    /* STATUS */
    .status-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 24px 0; flex-shrink: 0;
    }
    .status-time { font-family: 'DM Mono', monospace; font-size: 13px; color: #888; letter-spacing: 0.06em; }
    .status-icons { display: flex; gap: 6px; align-items: center; }
    .status-icon { font-size: 13px; color: #888; }

    /* HERO */
    .hero { padding: 14px 24px 22px; flex-shrink: 0; }
    .app-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 22px; }
    .app-name { font-size: 26px; font-weight: 700; color: #1a1a1a; letter-spacing: -0.5px; }
    .app-streak { font-size: 13px; color: #888; margin-top: 2px; }

    .litros-badge {
      display: flex; align-items: center; gap: 6px;
      background: #5BA8F5; border-radius: 20px; padding: 8px 14px 8px 10px;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
    }
    .litros-badge svg { width: 16px; height: 16px; fill: #fff; flex-shrink: 0; }
    .litros-badge-val { font-family: 'DM Mono', monospace; font-size: 14px; font-weight: 500; color: #fff; }

    .pies-row { display: flex; gap: 14px; }
    .pie-wrap { display: flex; flex-direction: column; align-items: center; gap: 10px; flex: 1; }
    .pie-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: #888; }

    /* HOUR CHIPS */
    .hours-row { display: flex; gap: 4px; justify-content: center; }
    .hour-chip {
      width: 28px; height: 28px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: 'DM Mono', monospace; font-size: 8px; font-weight: 500;
      color: #888; background: transparent;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
      transition: transform 0.15s; flex-shrink: 0;
      border: none; outline: none;
    }
    .hour-chip.done { background: #1a1a1a; color: #F5F0E8; }
    .hour-chip.future { opacity: 0.3; cursor: default; }
    .hour-chip:not(.future):active { transform: scale(0.88); }

    /* BOTTOM */
    .bottom {
      background: #1a1a1a;
      border-radius: 32px 32px 0 0;
      flex: 1; display: flex; flex-direction: column;
      padding: 16px 20px 0; min-height: 0;
    }

    .bottom-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; flex-shrink: 0; }
    .cal-month { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: #fff; font-weight: 500; }
    .cal-btns { display: flex; gap: 2px; }
    .cal-btns button {
      background: none; border: none; color: #555; cursor: pointer;
      font-size: 18px; padding: 4px 8px; border-radius: 6px;
      -webkit-tap-highlight-color: transparent; min-width: 36px; min-height: 36px;
      display: flex; align-items: center; justify-content: center;
    }
    .cal-btns button:active { color: #ccc; }

    .cal-day-labels { display: grid; grid-template-columns: repeat(7, 1fr); margin-bottom: 6px; flex-shrink: 0; }
    .cal-dl { font-family: 'DM Mono', monospace; font-size: 8px; text-transform: uppercase; letter-spacing: 0.04em; color: rgba(255,255,255,0.45); text-align: center; }

    .cal-grid-wrap { flex-shrink: 0; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 7px 5px; }

    .cal-cell-wrap {
      display: flex; align-items: center; justify-content: center;
      aspect-ratio: 1; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .cal-dot { width: 18px; height: 18px; border-radius: 50%; background: #2a2a2a; transition: transform 0.12s; flex-shrink: 0; }
    .cal-cell-wrap:active .cal-dot { transform: scale(0.85); }
    .cal-cell-wrap.done .cal-dot     { background: #fff; }
    .cal-cell-wrap.selected .cal-dot { background: #fff; }
    .cal-cell-wrap.today .cal-dot    { background: #444; outline: 1.5px solid #888; outline-offset: 2px; }
    .cal-cell-wrap.other-month       { pointer-events: none; opacity: 0; }

    .home-bar { display: flex; justify-content: center; padding: 10px 0 8px; flex-shrink: 0; margin-top: auto; }
    .home-line { width: 130px; height: 5px; background: #fff; border-radius: 99px; opacity: 0.07; }

    /* NOTIF TOAST */
    .toast {
      position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%) translateY(80px);
      background: #1a1a1a; color: #fff;
      font-family: 'DM Mono', monospace; font-size: 12px;
      padding: 10px 20px; border-radius: 20px;
      transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
      white-space: nowrap; z-index: 100;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<div class="app">
  <div class="status-bar">
    <span class="status-time" id="status-time">09:41</span>
    <div class="status-icons">
      <span class="status-icon">▲</span>
    </div>
  </div>

  <div class="hero">
    <div class="app-header">
      <div>
        <div class="app-name">Hidratación</div>
        <div class="app-streak" id="streak-label">1 día activo</div>
      </div>
      <div class="litros-badge" id="badge-btn" title="Toca para activar notificaciones">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 2C12 2 4 9.5 4 14.5C4 18.64 7.58 22 12 22C16.42 22 20 18.64 20 14.5C20 9.5 12 2 12 2Z"/></svg>
        <span class="litros-badge-val" id="status-litros">0.0 L</span>
      </div>
    </div>

    <div class="pies-row">
      <div class="pie-wrap">
        <svg width="152" height="152" viewBox="0 0 152 152" id="pie-morning"></svg>
        <div class="pie-label">Mañana</div>
        <div class="hours-row" id="hours-morning"></div>
      </div>
      <div class="pie-wrap">
        <svg width="152" height="152" viewBox="0 0 152 152" id="pie-afternoon"></svg>
        <div class="pie-label">Tarde</div>
        <div class="hours-row" id="hours-afternoon"></div>
      </div>
    </div>
  </div>

  <div class="bottom">
    <div class="bottom-header">
      <div class="cal-month" id="cal-month"></div>
      <div class="cal-btns">
        <button id="prev-btn">&#8249;</button>
        <button id="next-btn">&#8250;</button>
      </div>
    </div>
    <div class="cal-day-labels" id="cal-day-labels"></div>
    <div class="cal-grid-wrap" id="cal-grid-wrap">
      <div class="cal-grid" id="cal-grid"></div>
    </div>
    <div class="home-bar"><div class="home-line"></div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── DATOS ──
const DAYS=['L','M','X','J','V','S','D'];
const MONTHS=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const MORNING=['08:00','09:00','10:00','11:00','12:00'];
const AFTERNOON=['14:00','15:00','16:00','17:00','18:00'];
const ALL_TIMES=[...MORNING,...AFTERNOON];
const ML=100, PIE_FILL='#1a1a1a', PIE_BG='#DDD8CE', CENTER='#F5F0E8';

let viewDate=new Date(), selectedDate=new Date(), doneSlots={};
try{doneSlots=JSON.parse(localStorage.getItem('hidratacion_v1')||'{}');}catch(e){}

// Datos de ejemplo para los primeros 2 días del mes
const y0=new Date().getFullYear(),m0=new Date().getMonth();
const k1=new Date(y0,m0,1).toISOString().slice(0,10);
const k2=new Date(y0,m0,2).toISOString().slice(0,10);
if(!doneSlots[k1]) doneSlots[k1]=['08:00','09:00','10:00','11:00','12:00','14:00','15:00'];
if(!doneSlots[k2]) doneSlots[k2]=['08:00','09:00','10:00','11:00','12:00','14:00'];
const todayKey=new Date().toISOString().slice(0,10);
if(!doneSlots[todayKey]||!doneSlots[todayKey].length) doneSlots[todayKey]=['08:00','09:00','10:00'];

function save(){try{localStorage.setItem('hidratacion_v1',JSON.stringify(doneSlots));}catch(e){}}
function dateKey(d){return d.toISOString().slice(0,10);}
function calcStreak(){let s=0,d=new Date();d.setHours(0,0,0,0);for(let i=0;i<365;i++){const dk=d.toISOString().slice(0,10);if(doneSlots[dk]?.length){s++;d.setDate(d.getDate()-1);}else break;}return Math.max(s,1);}
function calcLitros(){let t=0;Object.values(doneSlots).forEach(a=>{t+=a.length*ML;});return(t/1000).toFixed(1);}

// ── TOAST ──
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// ── SERVICE WORKER & NOTIFICACIONES ──
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}

async function requestNotifications(){
  if(!('Notification' in window)){showToast('Notificaciones no disponibles');return;}
  const perm=await Notification.requestPermission();
  if(perm==='granted'){
    showToast('Notificaciones activadas');
    scheduleNotifications();
  } else {
    showToast('Actívalas en Ajustes → Safari');
  }
}

function scheduleNotifications(){
  if(Notification.permission!=='granted') return;
  const now=new Date();
  const nowH=now.getHours(), nowM=now.getMinutes();

  ALL_TIMES.forEach(t=>{
    const h=parseInt(t);
    const msUntil=((h-nowH)*60-nowM)*60*1000;
    if(msUntil>0){
      setTimeout(()=>{
        const dk=dateKey(new Date());
        const done=doneSlots[dk]||[];
        if(!done.includes(t)){
          new Notification('Hidratación 💧',{
            body:'Son las '+t+'. ¿Has bebido agua?',
            icon:'icon-192.png',
            badge:'icon-192.png',
            tag:'hidratacion-'+t,
            renotify:true
          });
        }
      }, msUntil);
    }
  });
}

// Activar notificaciones al tocar el badge
document.getElementById('badge-btn').addEventListener('click', requestNotifications);

// Programar al cargar si ya hay permiso
if(Notification.permission==='granted') scheduleNotifications();

// ── PIE CHART ──
function drawPie(id,done,total,times,dk){
  const svg=document.getElementById(id);svg.innerHTML='';
  const cx=76,cy=76,r=68,sa=(2*Math.PI)/total;
  for(let i=0;i<total;i++){
    const sA=-Math.PI/2+i*sa,eA=-Math.PI/2+(i+1)*sa;
    const x1=cx+r*Math.cos(sA),y1=cy+r*Math.sin(sA),x2=cx+r*Math.cos(eA),y2=cy+r*Math.sin(eA);
    const p=document.createElementNS('http://www.w3.org/2000/svg','path');
    p.setAttribute('d',`M${cx} ${cy} L${x1.toFixed(2)} ${y1.toFixed(2)} A${r} ${r} 0 ${(eA-sA)>Math.PI?1:0} 1 ${x2.toFixed(2)} ${y2.toFixed(2)}Z`);
    p.setAttribute('fill',i<done?PIE_FILL:PIE_BG);
    p.style.cursor='pointer';
    p.addEventListener('click',()=>toggle(dk,times[i]));
    svg.appendChild(p);
  }
  const c=document.createElementNS('http://www.w3.org/2000/svg','circle');
  c.setAttribute('cx',cx);c.setAttribute('cy',cy);c.setAttribute('r',34);c.setAttribute('fill',CENTER);svg.appendChild(c);
  const txt=document.createElementNS('http://www.w3.org/2000/svg','text');
  txt.setAttribute('x',cx);txt.setAttribute('y',cy+10);txt.setAttribute('text-anchor','middle');
  txt.setAttribute('font-family','DM Sans, sans-serif');txt.setAttribute('font-size','30');txt.setAttribute('font-weight','700');txt.setAttribute('fill','#1a1a1a');txt.textContent=done;
  svg.appendChild(txt);
}

// ── HORAS ──
function renderHours(cid,times,done,dk){
  const wrap=document.getElementById(cid);wrap.innerHTML='';
  const nowH=new Date().getHours();
  const isToday=selectedDate.toDateString()===new Date().toDateString();
  times.forEach(t=>{
    const h=parseInt(t),isDone=done.includes(t),isFuture=isToday&&h>nowH&&!isDone;
    const chip=document.createElement('button');
    chip.className='hour-chip'+(isDone?' done':isFuture?' future':'');
    chip.textContent=h+'h';
    chip.setAttribute('aria-label',t+(isDone?', hecha':''));
    if(!isFuture) chip.addEventListener('click',()=>toggle(dk,t));
    wrap.appendChild(chip);
  });
}

// ── RENDER ──
function renderPies(){
  const dk=dateKey(selectedDate),done=doneSlots[dk]||[];
  const mD=MORNING.filter(t=>done.includes(t)).length,aD=AFTERNOON.filter(t=>done.includes(t)).length;
  drawPie('pie-morning',mD,5,MORNING,dk);
  drawPie('pie-afternoon',aD,5,AFTERNOON,dk);
  renderHours('hours-morning',MORNING,done,dk);
  renderHours('hours-afternoon',AFTERNOON,done,dk);
  document.getElementById('status-litros').textContent=calcLitros()+' L';
  const s=calcStreak();
  document.getElementById('streak-label').textContent=s+(s===1?' día activo':' días activos');
}

function toggle(dk,t){
  if(!doneSlots[dk])doneSlots[dk]=[];
  const i=doneSlots[dk].indexOf(t);
  if(i>=0) doneSlots[dk].splice(i,1); else doneSlots[dk].push(t);
  save();
  renderPies();renderCalendar();
}

// ── CALENDARIO ──
function renderCalendar(){
  const dlW=document.getElementById('cal-day-labels');dlW.innerHTML='';
  DAYS.forEach(d=>{const el=document.createElement('div');el.className='cal-dl';el.textContent=d;dlW.appendChild(el);});
  const grid=document.getElementById('cal-grid');grid.innerHTML='';
  const y=viewDate.getFullYear(),m=viewDate.getMonth();
  document.getElementById('cal-month').textContent=MONTHS[m].toUpperCase()+' '+y;
  const today=new Date();today.setHours(0,0,0,0);
  let dow=new Date(y,m,1).getDay();dow=dow===0?6:dow-1;
  const dim=new Date(y,m+1,0).getDate();

  const mk=(cls)=>{
    const w=document.createElement('div');w.className='cal-cell-wrap '+cls;
    const d=document.createElement('div');d.className='cal-dot';w.appendChild(d);return w;
  };

  for(let i=0;i<35;i++){
    const dayNum=i-dow+1;
    if(dayNum<1||dayNum>dim){grid.appendChild(mk('other-month'));continue;}
    const d=new Date(y,m,dayNum);d.setHours(0,0,0,0);
    const dk=dateKey(d),n=(doneSlots[dk]||[]).length;
    const isToday=d.getTime()===today.getTime(),isPast=d<today,isSel=d.toDateString()===selectedDate.toDateString();
    let cls='';
    if(isSel) cls='selected';
    else if(isToday) cls='today';
    else if(isPast&&n>0) cls='done';
    const w=mk(cls);
    w.addEventListener('click',()=>{selectedDate=new Date(d);renderCalendar();renderPies();});
    grid.appendChild(w);
  }
  document.getElementById('cal-grid-wrap').style.height=document.getElementById('cal-grid').scrollHeight+'px';
}

document.getElementById('prev-btn').addEventListener('click',()=>{viewDate=new Date(viewDate.getFullYear(),viewDate.getMonth()-1,1);renderCalendar();});
document.getElementById('next-btn').addEventListener('click',()=>{viewDate=new Date(viewDate.getFullYear(),viewDate.getMonth()+1,1);renderCalendar();});

// ── RELOJ ──
function tick(){
  const n=new Date();
  document.getElementById('status-time').textContent=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
}
tick();setInterval(tick,30000);
renderCalendar();renderPies();setInterval(renderPies,60000);
</script>
</body>
</html>
